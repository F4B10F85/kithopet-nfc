<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #00645a;
  color: #333;
}

/* CONTENITORE */
.container {
  max-width: 400px;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* TITOLO */
h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #00645a;
}

/* CAMPI */
input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
}

/* TESTO LETTURA */
span {
  display: block;
  margin-top: 5px;
  margin-bottom: 15px;
  font-size: 14px;
}

/* BOTTONI */
button, a {
  display: block;
  width: 100%;
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  margin-top: 15px;
}

/* SALVA */
button {
  background: #00645a;
  color: white;
  border: none;
}

/* CHIAMA */
#chiamaBtn {
  background: #00a884;
  color: white;
}

/* LABEL */
p {
  margin: 10px 0 5px;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body style="font-family: Arial; padding:20px;">

<h2 id="nomeCane"></h2>

<p><b>Proprietario:</b> <span id="nomeProp"></span></p>
<p><b>Telefono:</b> <span id="telefono"></span></p>
<p><b>Info mediche:</b> <span id="mediche"></span></p>
<p><b>Note:</b> <span id="note"></span></p>

<br>

<a id="chiamaBtn" style="display:inline-block; padding:10px; background:#00645a; color:white; border-radius:8px; text-decoration:none;">
  📞 Chiama proprietario
</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGc8ySEGePDVQi9jZyjyCwETMSdF__rGk",
  authDomain: "kithopet-nfc.firebaseapp.com",
  projectId: "kithopet-nfc",
  storageBucket: "kithopet-nfc.firebasestorage.app",
  messagingSenderId: "225319373501",
  appId: "1:225319373501:web:0b1b722101e2cdce0205d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function caricaDati() {
  const ref = doc(db, "pets", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.body.innerHTML = "Pet non trovato";
    return;
  }

  const dati = snap.data();

  // dati
  document.getElementById("nomeCane").innerText = dati.nomeCane || "";
  document.getElementById("nomeProp").innerText = dati.proprietario || "";
  document.getElementById("telefono").innerText = dati.telefono || "";
  document.getElementById("mediche").innerText = dati.mediche || "";
  document.getElementById("note").innerText = dati.note || "";

  // bottone chiamata
  const btn = document.getElementById("chiamaBtn");

  if (dati.telefono) {
    btn.href = "tel:" + dati.telefono;
  } else {
    btn.innerText = "Numero non disponibile";
    btn.style.pointerEvents = "none";
    btn.style.opacity = "0.5";
  }
}

caricaDati();
</script>

</body>
</html>
