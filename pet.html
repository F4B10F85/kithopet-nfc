<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dati Animale</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #00645a;
      color: #333;
    }

    .container {
      max-width: 400px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      color: #00645a;
      font-size: 24px;
    }

    p {
      margin: 10px 0 5px;
      font-size: 13px;
      color: #666;
    }

    span {
      display: block;
      margin-bottom: 15px;
      font-size: 14px;
      color: #000;
    }

    a {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
      background: #ff3b30;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <h2 id="nomeCane">...</h2>

  <p>👤 Proprietario:</p>
  <span id="nomeProp"></span>

  <p>📞 Telefono:</p>
  <span id="telefono"></span>

  <p>💊 Info mediche:</p>
  <span id="mediche"></span>

  <p>📝 Note:</p>
  <span id="note"></span>

  <div class="map-container">
  <a id="chiamaBtn" class="call-btn">📞 Chiama proprietario</a>
</div>

  <p>📍 Posizione proprietario:</p>
<div id="map" style="width:100%; height:200px; border-radius:10px; overflow:hidden;"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGc8ySEGePDVQi9jZyjyCwETMSdF__rGk",
  authDomain: "kithopet-nfc.firebaseapp.com",
  projectId: "kithopet-nfc",
  storageBucket: "kithopet-nfc.firebasestorage.app",
  messagingSenderId: "225319373501",
  appId: "1:225319373501:web:0b1b722101e2cdce0205d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function caricaDati() {
  const ref = doc(db, "pets", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.body.innerHTML = "Pet non trovato";
    return;
  }

  const dati = snap.data();

  // 👇 QUI dentro, non fuori
  if (dati.lat && dati.lng) {
    document.getElementById("map").innerHTML = `
      <iframe
        width="100%"
        height="200"
        style="border:0"
        loading="lazy"
        allowfullscreen
        src="https://www.google.com/maps?q=${dati.lat},${dati.lng}&hl=it&z=15&output=embed">
      </iframe>
    `;
  } else {
    document.getElementById("map").innerHTML = "Posizione non disponibile";
  }

  // resto dei tuoi dati
  document.getElementById("nomeCane").innerText = dati.nomeCane || "";
  document.getElementById("nomeProp").innerText = dati.proprietario || "";
  document.getElementById("telefono").innerText = dati.telefono || "";
  document.getElementById("mediche").innerText = dati.mediche || "";
  document.getElementById("note").innerText = dati.note || "";

  const btn = document.getElementById("chiamaBtn");

  if (dati.telefono) {
    btn.href = "tel:" + dati.telefono;
  } else {
    btn.innerText = "Numero non disponibile";
    btn.style.pointerEvents = "none";
    btn.style.opacity = "0.5";
  }
}

caricaDati();

.map-container {
  margin-top: 15px;
}

.call-btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 12px;
  background: rgba(0,100,90,0.8);
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}
  
</script>

</body>
</html>
