<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifica Dati</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #00645a;
      color: #333;
    }

    .container {
      max-width: 400px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      color: #00645a;
      font-size: 24px;
      margin-bottom: 20px;
    }

    p {
      margin: 10px 0 5px;
      font-size: 13px;
      color: #666;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      margin-top: 20px;
      background: #00645a;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <p>🐶 Nome cane:</p>
  <input id="nomeCane" placeholder="Nome cane">

  <p>👤 Proprietario:</p>
  <input id="nomeProp">

  <p>📞 Telefono:</p>
  <input id="telefono">

  <p>💊 Info mediche:</p>
  <input id="mediche">

  <p>📝 Note:</p>
  <input id="note">

  <p>📍 Latitudine:</p>
  <input id="lat">
  
  <p>📍 Longitudine:</p>
  <input id="lng">

<button onclick="usaPosizione()">📍 Usa posizione attuale</button>
  
  <button onclick="salvaDati()">Salva</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGc8ySEGePDVQi9jZyjyCwETMSdF__rGk",
  authDomain: "kithopet-nfc.firebaseapp.com",
  projectId: "kithopet-nfc",
  storageBucket: "kithopet-nfc.firebasestorage.app",
  messagingSenderId: "225319373501",
  appId: "1:225319373501:web:0b1b722101e2cdce0205d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");
const keyUrl = urlParams.get("key");

let dati = null;

async function caricaDati() {
  const ref = doc(db, "pets", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
  // 👉 primo utilizzo: nessun dato ancora
  dati = { key: keyUrl };
  
  // NON bloccare la pagina
  return;
}

  dati = snap.data();

  // 🔐 BLOCCO ACCESSO
  if (dati.key !== keyUrl) {
    document.body.innerHTML = "Accesso negato";
    return;
  }

  // riempie i campi
  document.getElementById("nomeCane").value = dati.nomeCane || "";
  document.getElementById("nomeProp").value = dati.proprietario || "";
  document.getElementById("telefono").value = dati.telefono || "";
  document.getElementById("mediche").value = dati.mediche || "";
  document.getElementById("note").value = dati.note || "";
}

async function salvaDati() {

  const ref = doc(db, "pets", id);

  await setDoc(ref, {
    nomeCane: document.getElementById("nomeCane").value,
    proprietario: document.getElementById("nomeProp").value,
    telefono: document.getElementById("telefono").value,
    mediche: document.getElementById("mediche").value,
    note: document.getElementById("note").value,
    lat: parseFloat(document.getElementById("lat").value) || null,
    lng: parseFloat(document.getElementById("lng").value) || null,

    // 🔑 QUI STA LA MAGIA
    key: (dati && dati.key) ? dati.key : keyUrl
  });

  alert("Dati salvati");
}

window.salvaDati = salvaDati;

caricaDati();

function usaPosizione() {
  if (!navigator.geolocation) {
    alert("Geolocalizzazione non supportata");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("lat").value = pos.coords.latitude;
    document.getElementById("lng").value = pos.coords.longitude;
  }, () => {
    alert("Impossibile ottenere la posizione");
  });
}

// 👇 QUESTA È LA CHIAVE DELLA VITA
window.usaPosizione = usaPosizione;
  
</script>

</body>
</html>
